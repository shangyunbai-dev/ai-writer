let currentLang = "en";

const langBtn = document.getElementById("langBtn");
const langMenu = document.getElementById("langMenu");
langBtn.addEventListener("click", function(e){
    e.stopPropagation();
    langMenu.classList.toggle("show");
});
document.addEventListener("click", function(){
    langMenu.classList.remove("show");
});

document.querySelectorAll(".lang-menu div").forEach(item=>{
    item.addEventListener("click", function(){
        const lang = this.getAttribute("data-lang");
        currentLang = lang;
        langBtn.innerText = lang.toUpperCase();
        applyLang(lang);
        langMenu.classList.remove("show");
    });
});

function applyLang(lang){
    const t = translations[lang];
    document.querySelectorAll("[data-i18n]").forEach(el=>{
        const key = el.getAttribute("data-i18n");
        if(t[key]) el.innerHTML = t[key];
    });
    document.querySelectorAll("[data-i18n-placeholder]").forEach(el=>{
        const key = el.getAttribute("data-i18n-placeholder");
        if(t[key]) el.placeholder = t[key];
    });
}

function toggleFaq(el){
    const ans = el.nextElementSibling;
    ans.classList.toggle("show");
    el.querySelector("span:last-child").innerText = ans.classList.contains("show") ? "-" : "+";
}

const codeBtn = document.getElementById("codeBtn");
const codeInput = document.getElementById("codeInput");
const codeMsg = document.getElementById("codeMsg");
const enterChatBtn = document.getElementById("enterChatBtn");

codeBtn.addEventListener("click", async function(){
    const code = codeInput.value.trim();
    if (!code) {
        codeMsg.innerHTML = translations[currentLang].code_invalid;
        codeMsg.style.color = "#ef4444";
        enterChatBtn.style.display = "none";
        return;
    }

    try {
        // 调用Worker的/redeem接口验证兑换码
        const res = await fetch("https://cold-fire-5648.shangyunbai-vercel.workers.dev/redeem", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code: code })
        });
        const data = await res.json();

        if (data.success) {
            // 验证成功，显示剩余额度并跳转
            codeMsg.innerHTML = translations[currentLang].code_valid.replace("{credits}", data.remainingUses);
            codeMsg.style.color = "#22c55e";
            localStorage.setItem("ai_credits", data.remainingUses);
            enterChatBtn.style.display = "inline-block";
            // 自动跳转到聊天页面
            setTimeout(() => {
                window.location.href = "/chat.html";
            }, 1500);
        } else {
            codeMsg.innerHTML = translations[currentLang].code_invalid;
            codeMsg.style.color = "#ef4444";
            enterChatBtn.style.display = "none";
        }
    } catch (err) {
        codeMsg.innerHTML = "Network error, please try again";
        codeMsg.style.color = "#ef4444";
        enterChatBtn.style.display = "none";
    }
});
